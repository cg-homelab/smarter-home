services:
  # Backend Application
  backend:
    container_name: backend
    build:
      context: ./
      dockerfile: Dockerfile.api
      #target: prod
    restart: unless-stopped
    ports:
      - ${BACKEND_PORT}:${BACKEND_PORT}
    environment:
      DATABASE_URL: postgresql://${DB_USERNAME}:${DB_PASSWORD}@sm-db:${DB_PORT}/${DB_NAME}
      BACKEND_PORT: ${BACKEND_PORT}
      FRONTEND_PORT: ${FRONTEND_PORT}
      AUTH_SECRET: ${AUTH_SECRET}
      LOG_LEVEL: debug
    depends_on:
      database:
        condition: service_healthy
    networks:
      - smarter_home

  # Webapp (Vite/React SPA)
  webapp:
    build:
      context: ./
      dockerfile: Dockerfile.webapp
    restart: unless-stopped
    ports:
      - ${FRONTEND_PORT}:3000
    environment:
      - API_URL=http://backend:${BACKEND_PORT}
    # depends_on:
    #   - backend
    networks:
      - smarter_home

  # Database
  database:
    container_name: sm-db
    image: timescale/timescaledb-ha:pg17
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - smarter_home_database_volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "sh -c 'pg_isready -U ${DB_USERNAME} -d ${DB_NAME}'"]
      interval: 5s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - smarter_home
    # container_name: surrealdb
    # env_file:
    #   - .env
    # entrypoint:
    #   - /surreal
    #   - start
    #   - --user
    #   - ${SURREALDB_USER}
    #   - --pass
    #   - ${SURREALDB_PASS}
    # image: surrealdb/surrealdb:latest
    # ports:
    #   - 8000:8000
    # networks:
    #   - smarter_home

volumes:
  smarter_home_database_volume:
networks:
  smarter_home:
