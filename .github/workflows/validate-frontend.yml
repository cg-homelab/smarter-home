name: validate-frontend

on:
  pull_request:
    branches:
      - main
    paths:
      - "src/services/webapp/**"

jobs:
  lint-and-typecheck-webapp:
    name: Lint and typecheck webapp
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/services/webapp
    steps:
      - uses: actions/checkout@v3

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Run lint
        run: bun run lint

      - name: Run typecheck
        run: bunx tsc --noEmit